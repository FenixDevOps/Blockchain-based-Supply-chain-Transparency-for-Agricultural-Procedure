<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AgriChain | Product Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f2fbf4;color:#14532d;font-family:'Plus Jakarta Sans',sans-serif;padding:20px;min-height:100vh}
    .wrap{max-width:580px;margin:0 auto;padding-bottom:48px}
    
    /* Header */
    .header{text-align:center;margin-bottom:28px}
    .logo{display:inline-flex;align-items:center;gap:8px;background:#16a34a;color:#fff;
          padding:10px 22px;border-radius:12px;font-size:15px;font-weight:800;
          margin-bottom:14px;box-shadow:0 4px 14px rgba(22,163,74,.25)}
    .title{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}
    .sub{font-size:13px;color:#4d7c60;font-weight:500}

    /* Scanner box */
    #reader{width:100%;border:2px dashed #16a34a;border-radius:16px;overflow:hidden;
            background:#fff;margin-bottom:20px}
    .btn{width:100%;padding:16px;background:#16a34a;color:#fff;border:none;
         border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;
         font-family:inherit;box-shadow:0 4px 14px rgba(22,163,74,.3);
         transition:transform .15s}
    .btn:active{transform:scale(.98)}

    /* Loading */
    #loader{display:none;text-align:center;padding:40px}
    .spinner{width:40px;height:40px;border:3px solid #dcfce7;border-top-color:#16a34a;
             border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loader p{color:#16a34a;font-weight:700;font-size:15px}

    /* Result card */
    #result{display:none}
    .card{background:#fff;border:1px solid #d8f0de;border-radius:16px;overflow:hidden;
          box-shadow:0 4px 20px rgba(22,163,74,.07);margin-bottom:16px}
    .card-top{padding:20px;border-bottom:1px solid #d8f0de}
    .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:10px;
           font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
    .badge-ok{background:#dcfce7;color:#166534;border:1px solid #d8f0de}
    .badge-warn{background:#fff1f2;color:#9f1239;border:1px solid #fecdd3}
    .p-name{font-size:20px;font-weight:900;letter-spacing:-.3px;margin-bottom:4px}
    .p-meta{font-size:12px;color:#86a892;font-family:monospace}

    /* Journey */
    .journey{padding:20px}
    .journey-title{font-size:11px;font-weight:800;text-transform:uppercase;
                   letter-spacing:.1em;color:#86a892;margin-bottom:18px}
    .step{display:flex;gap:14px;margin-bottom:20px;position:relative}
    .step:not(:last-child)::after{content:'';position:absolute;left:18px;top:40px;
       bottom:-12px;width:2px;background:#d8f0de}
    .step-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;
               justify-content:center;font-size:18px;flex-shrink:0}
    .step-body{background:#f2fbf4;border:1px solid #d8f0de;border-radius:10px;
               padding:12px 14px;flex:1}
    .step-role{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
    .step-actor{font-size:14px;font-weight:700;color:#14532d;margin:2px 0}
    .step-detail{font-size:11px;color:#4d7c60;display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
    .step-hash{font-size:9px;color:#86a892;font-family:monospace;margin-top:6px}

    .rescan{text-align:center;margin-top:16px}
    .rescan button{background:none;border:1px solid #d8f0de;border-radius:8px;
                   padding:10px 24px;color:#4d7c60;cursor:pointer;font-family:inherit;
                   font-weight:600;font-size:13px;transition:all .15s}
    .rescan button:hover{background:#dcfce7}

    .err-box{background:#fff1f2;border:1px solid #fecdd3;border-radius:12px;
             padding:24px;text-align:center;margin-top:20px}
    .err-box p{color:#9f1239;font-weight:700;margin-bottom:12px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">🌿 AgriChain</div>
    <h1 class="title">Product Tracker</h1>
    <p class="sub">Scan a QR code to verify authenticity</p>
  </div>

  <!-- Scanner -->
  <div id="scannerBox">
    <div id="reader"><div style="padding:36px;text-align:center">
      <button class="btn" onclick="startScan()">📷 Start Camera Scanner</button>
    </div></div>
  </div>

  <!-- Loading -->
  <div id="loader"><div class="spinner"></div><p>Verifying on Blockchain…</p></div>

  <!-- Result -->
  <div id="result"></div>
</div>

<script>
  /* ── Config ── */
  const BACKEND = 'https://blockchain-based-supply-chain.onrender.com';

  /* ── Read batch from URL if opened via QR link ── */
  const params = new URLSearchParams(window.location.search);
  const urlBatch = params.get('batch');
  if (urlBatch) fetchTrace(urlBatch);

  /* ── Start camera scanner ── */
  function startScan() {
    document.getElementById('reader').innerHTML = '';
    const scanner = new Html5QrcodeScanner('reader', {
      fps: 10,
      qrbox: { width: 240, height: 240 },
      aspectRatio: 1.0
    }, false);

    scanner.render(function(text) {
      scanner.clear();
      // Extract batch ID no matter what format is in QR
      let batch = text;
      if (text.includes('?batch=')) {
        batch = text.split('?batch=')[1].split('&')[0].trim();
      } else if (text.includes('/track/')) {
        batch = text.split('/track/')[1].split('?')[0].trim();
      }
      batch = batch.trim().toUpperCase();
      if (!batch) { showError('Could not read batch ID from QR code.'); return; }
      fetchTrace(batch);
    }, function() {/* ignore frame errors */});
  }

  /* ── Fetch from backend ── */
  async function fetchTrace(batchId) {
    document.getElementById('scannerBox').style.display = 'none';
    document.getElementById('loader').style.display = 'block';
    document.getElementById('result').innerHTML = '';

    try {
      const url = `${BACKEND}/api/trace/${batchId}`;
      console.log('[AgriChain] Fetching:', url);
      const res = await fetch(url);
      const data = await res.json();

      if (!res.ok || !data.product) {
        showError(`Batch <b>${batchId}</b> not found on the blockchain. Make sure you scanned a valid AgriChain QR code.`);
        return;
      }
      renderResult(data);
    } catch (err) {
      console.error(err);
      showError('Network error: could not reach the AgriChain server. Please try again.');
    } finally {
      document.getElementById('loader').style.display = 'none';
    }
  }

  /* ── Render journey ── */
  const ROLE_STYLE = {
    Farmer:      { icon: '🚜', bg: '#16a34a', text: '#166534' },
    Processor:   { icon: '🏭', bg: '#d97706', text: '#92400e' },
    Distributor: { icon: '🚛', bg: '#2563eb', text: '#1e40af' },
    Retailer:    { icon: '🏪', bg: '#e11d48', text: '#9f1239' },
    Consumer:    { icon: '🛒', bg: '#7c3aed', text: '#5b21b6' },
  };

  function renderResult(data) {
    const p = data.product;
    const anomalous = p.is_anomalous;

    let stepsHtml = '';
    (data.journey || []).forEach(block => {
      const role = block.data.role || 'System';
      const rs = ROLE_STYLE[role] || { icon: '📦', bg: '#4d7c60', text: '#14532d' };
      const anomFlag = block.data.is_anomalous
        ? '<span style="color:#e11d48;font-weight:800"> ⚠️ Breach</span>' : '';
      stepsHtml += `
        <div class="step">
          <div class="step-icon" style="background:${rs.bg}22;border:1px solid ${rs.bg}44">${rs.icon}</div>
          <div class="step-body">
            <div class="step-role" style="color:${rs.text}">${role}${anomFlag}</div>
            <div class="step-actor">${block.data.actor || '—'}</div>
            <div class="step-detail">
              <span>📍 ${block.data.location || '—'}</span>
              <span>🌡️ ${block.data.temperature_c ?? '—'}°C</span>
              <span>💧 ${block.data.humidity_pct ?? '—'}%</span>
            </div>
            ${block.data.notes ? `<div class="step-detail" style="margin-top:4px;font-style:italic">${block.data.notes}</div>` : ''}
            <div class="step-hash">SHA-256: ${block.hash.slice(0, 26)}…</div>
          </div>
        </div>`;
    });

    document.getElementById('result').innerHTML = `
      <div class="card">
        <div class="card-top">
          <div class="badge ${anomalous ? 'badge-warn' : 'badge-ok'}">${anomalous ? '⚠️ Anomaly Detected' : '✅ Blockchain Verified'}</div>
          <div class="p-name">${p.name}</div>
          <div class="p-meta"># ${p.batch_id}  ·  ${p.origin}  ·  ${p.crop_type}</div>
        </div>
        <div class="journey">
          <div class="journey-title">Supply Chain Journey</div>
          ${stepsHtml || '<p style="color:#86a892;text-align:center;padding:20px">No journey data yet.</p>'}
        </div>
      </div>
      <div class="rescan">
        <button onclick="location.href=location.pathname">🔄 Scan Another Item</button>
      </div>`;
    document.getElementById('result').style.display = 'block';
  }

  function showError(msg) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('result').innerHTML = `
      <div class="err-box">
        <p>❌ ${msg}</p>
        <button class="btn" style="width:auto;padding:10px 24px" onclick="location.href=location.pathname">Try Again</button>
      </div>`;
    document.getElementById('result').style.display = 'block';
  }
</script>
</body>
</html>
